{% extends 'base.html' %}

{% block content %}

<h1>Gourmet IceCream</h1>

<p>Пример сложного наследования Django: <strong>Product → FoodProduct → Dessert → GourmetIceCream</strong>.</p>

<div class="row">
    {% for item in gourmet_list %}
        <div class="col-md-6 mb-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">{{ item.name }}</h5>
                    <p class="card-text">Flavor: {{ item.flavor }}</p>
                    <p class="card-text">Price: {{ item.price }}</p>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
