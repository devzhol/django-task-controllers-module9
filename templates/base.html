{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Task List</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}"
    >

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Task List</a>
        <div>
            <a class="nav-link d-inline" href="/">Главная</a>
            <a class="nav-link d-inline" href="/tasks/">Задачи</a>
            <a class="nav-link d-inline" href="/users/">Пользователи</a>
            <a class="nav-link d-inline" href="/icecream/create/">Мороженое</a>
            <a class="nav-link d-inline" href="/icecream/batch/">Пакет мороженого</a>
            <a class="nav-link d-inline" href="/recipes/">Рецепты</a>
            <a class="nav-link d-inline" href="/gourmet-icecream/">Gourmet IceCream</a>
            <a class="nav-link d-inline" href="/bbcode/">BBCode</a>
            <a class="nav-link d-inline" href="/about/">О проекте</a>
            {% if user.is_authenticated %}
                <span class="navbar-text ms-3">{{ user.username }}</span>
                <a class="nav-link d-inline" href="/logout/">Выйти</a>
            {% else %}
                <a class="nav-link d-inline" href="/login/">Войти</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
